<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>$title</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #090c0b; --surface: #0f1312; --surface2: #161c1a; --border: #1e2422; --border2: #283230;
  --text: #ddd8c2; --sub: #7c8c88; --dim: #4a5552; --gold: #f0bb34;
  --green: #28a46a; --green-bg: rgba(40,164,106,.12); --green-bdr: rgba(40,164,106,.28);
  --red: #c43848; --amber: #c48018; --amber-bg: rgba(196,128,24,.12); --amber-bdr: rgba(196,128,24,.28);
  --neutral-bg: rgba(255,255,255,.05); --neutral-bdr: rgba(255,255,255,.10);
}
body { font-family: Inter, Segoe UI, Arial, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; min-height: 100vh; }
main { max-width: 1540px; margin: 0 auto; padding: 52px 52px 72px; }
.hdr { margin-bottom: 40px; padding-bottom: 36px; border-bottom: 1px solid var(--border); }
.hdr-title { font-family: Consolas, 'Cascadia Mono', ui-monospace, monospace; font-size: 30px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.hdr-title em { color: var(--gold); font-style: normal; }
.hdr-sep { color: var(--dim); margin: 0 10px; font-weight: 400; }
.hdr-sub { font-size: 14px; color: var(--sub); margin-bottom: 16px; }
.tags { display: flex; flex-wrap: wrap; gap: 6px; }
.tag { font-family: Consolas, 'Cascadia Mono', ui-monospace, monospace; font-size: 11px; color: var(--sub); background: var(--surface2); border: 1px solid var(--border2); border-radius: 5px; padding: 4px 10px; }
.filter-bar { display: flex; align-items: center; justify-content: space-between; gap: 18px; margin-bottom: 14px; padding: 10px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
.filter-menus { display: flex; align-items: center; flex-wrap: wrap; gap: 7px; }
.filter-menu { position: relative; }
.filter-menu summary { display: flex; align-items: center; gap: 9px; min-width: 112px; padding: 7px 10px; color: var(--sub); background: var(--surface2); border: 1px solid var(--border2); border-radius: 4px; cursor: pointer; font-family: Consolas, 'Cascadia Mono', ui-monospace, monospace; font-size: 11px; list-style: none; }
.filter-menu summary::-webkit-details-marker { display: none; }
.filter-menu summary::after { content: "+"; margin-left: auto; color: var(--dim); }
.filter-menu[open] summary { color: var(--text); border-color: var(--gold); }
.filter-menu[open] summary::after { content: "-"; color: var(--gold); }
.filter-selection { color: var(--gold); }
.filter-options { position: absolute; z-index: 10; top: calc(100% + 6px); left: 0; min-width: 190px; max-width: min(280px, calc(100vw - 36px)); max-height: 280px; overflow-y: auto; padding: 6px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 5px; box-shadow: 0 14px 34px rgba(0,0,0,.38); }
.filter-option { display: flex; align-items: center; gap: 9px; padding: 7px 8px; color: var(--sub); border-radius: 3px; cursor: pointer; font-family: Consolas, 'Cascadia Mono', ui-monospace, monospace; font-size: 11px; white-space: nowrap; }
.filter-option:hover { color: var(--text); background: var(--neutral-bg); }
.filter-option input { accent-color: var(--gold); }
.filter-status { display: flex; align-items: center; gap: 12px; flex-shrink: 0; font-family: Consolas, 'Cascadia Mono', ui-monospace, monospace; font-size: 11px; color: var(--sub); }
#reset-filters { padding: 7px 10px; color: var(--sub); background: transparent; border: 1px solid var(--border2); border-radius: 4px; cursor: pointer; font: inherit; }
#reset-filters:hover { color: var(--text); border-color: var(--sub); }
#reset-filters:focus-visible, .filter-menu summary:focus-visible { outline: 1px solid var(--gold); outline-offset: 2px; }
.tbl-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.tbl-bar { display: flex; align-items: center; padding: 14px 22px; border-bottom: 1px solid var(--border); }
.tbl-lbl { font-size: 11px; font-weight: 600; letter-spacing: .8px; text-transform: uppercase; color: var(--dim); }
.tbl-scroll { overflow-x: auto; }
table { border-collapse: collapse; width: 100%; min-width: 880px; }
th { font-size: 10px; font-weight: 600; letter-spacing: .8px; text-transform: uppercase; color: var(--dim); padding: 11px 20px; text-align: center; border-bottom: 1px solid var(--border); background: var(--surface2); white-space: nowrap; }
th:first-child { text-align: left; }
.sort-button { border: 0; padding: 0; background: none; color: inherit; font: inherit; letter-spacing: inherit; text-transform: inherit; cursor: pointer; }
.sort-button:focus-visible { outline: 1px solid var(--gold); outline-offset: 4px; }
th[aria-sort="ascending"] .sort-button::after { content: " \2191"; color: var(--gold); }
th[aria-sort="descending"] .sort-button::after { content: " \2193"; color: var(--gold); }
td { padding: 20px; border-bottom: 1px solid var(--border); vertical-align: middle; white-space: nowrap; }
tr:last-child td { border-bottom: none; }
.c { text-align: center; }
.asset-cell { display: flex; align-items: center; gap: 12px; }
.asset-mark { width: 3px; height: 36px; flex-shrink: 0; }
.asset { font-family: Consolas, 'Cascadia Mono', ui-monospace, monospace; font-size: 17px; font-weight: 600; }
.tf-badge { display: inline-block; font-family: Consolas, 'Cascadia Mono', ui-monospace, monospace; font-size: 12px; font-weight: 500; background: var(--surface2); border: 1px solid var(--border2); border-radius: 4px; padding: 4px 9px; color: var(--sub); }
.n, .dir { font-family: Consolas, 'Cascadia Mono', ui-monospace, monospace; font-size: 15px; font-weight: 500; color: var(--text); }
.dir { display: inline-block; min-width: 56px; }
.long { color: var(--green); }
.short { color: var(--red); }
.pill { display: inline-flex; align-items: center; justify-content: center; font-family: Consolas, 'Cascadia Mono', ui-monospace, monospace; font-size: 13px; font-weight: 600; padding: 7px 10px; border-radius: 7px; min-width: 62px; letter-spacing: 0; }
.good { background: var(--green-bg); color: #38d888; border: 1px solid var(--green-bdr); }
.bad { background: rgba(196,56,72,.12); color: #e06878; border: 1px solid rgba(196,56,72,.28); }
.warn { background: var(--amber-bg); color: #dfaa38; border: 1px solid var(--amber-bdr); }
.neutral, .plain { background: var(--neutral-bg); color: var(--sub); border: 1px solid var(--neutral-bdr); }
.pair-label { display: block; margin-top: 2px; font-size: 8px; color: var(--sub); letter-spacing: 0; text-transform: none; }
.details-link { display: inline-block; padding: 6px 10px; color: var(--gold); border: 1px solid var(--border2); border-radius: 4px; font-family: Consolas, 'Cascadia Mono', ui-monospace, monospace; font-size: 11px; text-decoration: none; }
.details-link:hover { border-color: var(--gold); }
#results-table tr[hidden] { display: none; }
.footer { margin-top: 28px; display: flex; justify-content: flex-end; font-family: Consolas, 'Cascadia Mono', ui-monospace, monospace; font-size: 11px; color: var(--dim); }
@media (max-width: 720px) { main { padding: 32px 18px 48px; } .hdr-title { font-size: 24px; } .filter-bar { align-items: stretch; flex-direction: column; } .filter-status { justify-content: space-between; } }
</style>
</head>
<body>
<main>
<div class="hdr">
<p class="hdr-title"><em>$strategy</em><span class="hdr-sep">/</span>results</p>
<p class="hdr-sub">Grouped by asset - all variants</p>
<div class="tags">
$tags
</div>
</div>
$filters
<div class="tbl-wrap">
<div class="tbl-bar"><span class="tbl-lbl">Asset breakdown</span></div>
<div class="tbl-scroll">
<table id="results-table">
<thead><tr>$columns</tr></thead>
<tbody>
$rows
</tbody>
</table>
</div>
</div>
<div class="footer"><span>generated $generated</span></div>
</main>
<script>
const table = document.getElementById("results-table");
const headers = Array.from(table.querySelectorAll("th[aria-sort]"));
const body = table.tBodies[0];
const rows = Array.from(body.rows);

const filterBar = document.getElementById("filter-bar");
if (filterBar) {
  const inputs = Array.from(filterBar.querySelectorAll("input[data-filter-key]"));
  const menus = Array.from(filterBar.querySelectorAll(".filter-menu"));
  const matchCount = document.getElementById("filter-match-count");
  const applyFilters = () => {
    const selected = new Map();
    for (const input of inputs) {
      if (!selected.has(input.dataset.filterKey)) selected.set(input.dataset.filterKey, new Set());
      if (input.checked) selected.get(input.dataset.filterKey).add(input.value);
    }
    let matches = 0;
    for (const row of rows) {
      let visible = true;
      for (const [key, values] of selected) {
        if (!values.has(row.getAttribute("data-" + key))) {
          visible = false;
          break;
        }
      }
      row.hidden = !visible;
      if (visible) matches += 1;
    }
    matchCount.textContent = matches + " of " + rows.length + " variants";
    for (const menu of menus) {
      const menuInputs = Array.from(menu.querySelectorAll("input"));
      const checked = menuInputs.filter(input => input.checked).length;
      menu.querySelector(".filter-selection").textContent = checked + "/" + menuInputs.length;
    }
  };
  filterBar.addEventListener("change", event => {
    if (event.target.matches("input[data-filter-key]")) applyFilters();
  });
  document.getElementById("reset-filters").addEventListener("click", () => {
    for (const input of inputs) input.checked = true;
    applyFilters();
  });
}

for (const header of headers) {
  header.querySelector("button").addEventListener("click", () => {
    const direction = header.getAttribute("aria-sort") === "ascending" ? "descending" : "ascending";
    for (const item of headers) item.setAttribute("aria-sort", "none");
    header.setAttribute("aria-sort", direction);
    const column = header.cellIndex;
    const keyedRows = rows.map(row => ({
      row,
      value: Number.parseFloat(row.cells[column].dataset.sortValue),
      order: Number(row.dataset.originalOrder),
    }));
    keyedRows.sort((left, right) => {
      const originalOrder = left.order - right.order;
      if (Number.isNaN(left.value)) return Number.isNaN(right.value) ? originalOrder : 1;
      if (Number.isNaN(right.value)) return -1;
      const difference = left.value - right.value;
      return difference ? (direction === "ascending" ? difference : -difference) : originalOrder;
    });
    body.style.display = "none";
    body.replaceChildren(...keyedRows.map(item => item.row));
    body.style.display = "";
  });
}
</script>
</body>
</html>
