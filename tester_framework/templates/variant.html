<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>$title</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg:#090c0b; --surface:#0f1312; --surface2:#161c1a; --border:#1e2422; --border2:#283230; --text:#ddd8c2; --sub:#7c8c88; --dim:#4a5552; --gold:#f0bb34; }
body { font-family:Inter,Segoe UI,Arial,sans-serif; background:var(--bg); color:var(--text); line-height:1.5; min-height:100vh; }
main { max-width:1540px; margin:0 auto; padding:42px 52px 64px; }
a { color:var(--gold); text-decoration:none; }
a:hover { text-decoration:underline; }
.back { display:inline-block; margin-bottom:24px; font:12px Consolas,'Cascadia Mono',ui-monospace,monospace; }
.hdr { padding-bottom:28px; border-bottom:1px solid var(--border); }
h1 { font:600 24px Consolas,'Cascadia Mono',ui-monospace,monospace; }
.result { margin-top:7px; color:var(--sub); }
.page-note { margin-top:4px; color:var(--dim); font-size:12px; }
section { margin-top:28px; }
h2 { margin-bottom:9px; color:var(--dim); font-size:11px; letter-spacing:.8px; text-transform:uppercase; }
.detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:28px; }
.detail-scroll { overflow:auto; border:1px solid var(--border); border-radius:6px; }
.detail-table { border-collapse:collapse; width:100%; min-width:720px; background:var(--surface); }
.detail-table.ledger { min-width:1050px; }
.detail-table th { padding:9px 12px; text-align:right; color:var(--dim); background:var(--surface2); border-bottom:1px solid var(--border); font-size:10px; letter-spacing:.6px; text-transform:uppercase; white-space:nowrap; }
.detail-table th:first-child { text-align:left; }
.detail-table td { padding:10px 12px; text-align:right; color:var(--sub); border-bottom:1px solid var(--border); font:12px Consolas,'Cascadia Mono',ui-monospace,monospace; white-space:nowrap; }
.detail-table td:first-child { text-align:left; color:var(--text); }
.empty { padding:14px; color:var(--dim); background:var(--surface); border:1px solid var(--border); border-radius:6px; }
.pagination { display:grid; grid-template-columns:80px 1fr 80px; align-items:center; gap:14px; margin-top:22px; padding:12px 14px; background:var(--surface); border:1px solid var(--border); border-radius:6px; font:11px Consolas,'Cascadia Mono',ui-monospace,monospace; }
.pagination span { color:var(--sub); text-align:center; }
.pagination a:last-child { text-align:right; }
.footer { margin-top:28px; text-align:right; color:var(--dim); font-size:11px; }
@media (max-width:900px) { .detail-grid { grid-template-columns:1fr; gap:0; } }
@media (max-width:720px) { main { padding:28px 16px 44px; } h1 { font-size:19px; } }
</style>
</head>
<body>
<main>
<a class="back" href="../index.html">&larr; All results</a>
<header class="hdr">
<h1>$title</h1>
<p class="result">$result</p>
<p class="page-note">$page_note</p>
</header>
$sections
$pagination
$trade_section
$pagination
<p class="footer">generated $generated</p>
</main>
</body>
</html>
